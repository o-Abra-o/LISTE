<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json?v=2">
<link rel="icon" href="icon-512.png?v=2" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
<meta name="theme-color" content="#7ab87a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Foglio camere">
<title>Foglio camere</title>
<style>
  :root {
    --ink: #1a1a1a;
    --line: #d8d8d8;
    --bg: #f3f1ec;
    --panel: #ffffff;
    --accent: #6b4ea0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* ---- area controlli (non stampata) ---- */
  .controls {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 8px;
  }
  .controls h1 {
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 4px;
  }
  .controls p {
    margin: 0 0 14px;
    font-size: 13px;
    color: #555;
    line-height: 1.5;
  }
  textarea {
    width: 100%;
    min-height: 220px;
    padding: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    line-height: 1.5;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    resize: vertical;
  }
  .btnrow {
    display: flex;
    gap: 10px;
    margin: 12px 0 4px;
    flex-wrap: wrap;
  }
  button {
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 9px 18px;
    border: 1px solid var(--accent);
    border-radius: 8px;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
  }
  button.secondary {
    background: #fff;
    color: var(--accent);
  }
  button:active { transform: translateY(1px); }
  .meta {
    font-size: 12px;
    color: #666;
    margin: 8px 0 0;
  }

  /* ---- foglio (stampato) ---- */
  .sheet {
    background: var(--panel);
    max-width: 900px;
    margin: 18px auto 40px;
    padding: 28px 32px;
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  td, th {
    padding: 5px 4px;
    vertical-align: baseline;
    white-space: nowrap;
  }
  .add-row-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid #ccc;
    background: #fff;
    color: #aaa;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    margin-left: 6px;
    vertical-align: middle;
    transition: border-color .15s, color .15s;
    flex-shrink: 0;
  }
  .add-row-btn:hover { border-color: var(--accent); color: var(--accent); }
  .add-row-btn:active { transform: none; }
  .del-row-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid #ccc;
    background: #fff;
    color: #aaa;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    margin-left: 4px;
    vertical-align: middle;
    transition: border-color .15s, color .15s;
    flex-shrink: 0;
  }
  .del-row-btn:hover { border-color: #c0392b; color: #c0392b; }
  .del-row-btn:active { transform: none; }
  tr.empty-row td {
    border-bottom: 1px solid var(--line);
    padding: 0;
    height: 22px;
  }
  .x-col { width: 22px; }
  .x-del-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border: none;
    background: none;
    color: #d24b3f;
    font-size: 13px;
    font-weight: 700;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    opacity: .55;
    transition: opacity .15s, transform .1s;
  }
  .x-del-btn:hover { opacity: 1; }
  .x-del-btn:active { transform: scale(0.85); }

  .edit-col { width: 22px; }
  .edit-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border: none;
    background: none;
    cursor: pointer;
    padding: 0;
    opacity: .55;
    transition: opacity .15s, transform .1s;
  }
  .edit-btn:hover { opacity: 1; }
  .edit-btn:active { transform: scale(0.85); }
  .edit-btn svg { width: 14px; height: 14px; display: block; }
  .edit-pencil svg { stroke: #3b6fd1; }
  .edit-check svg { stroke: #2e9e4f; }

  tr.editing-row td {
    padding-top: 3px;
    padding-bottom: 3px;
  }
  .edit-input {
    width: 100%;
    box-sizing: border-box;
    font: inherit;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11px;
    padding: 4px 6px;
    border: 1px solid var(--accent);
    border-radius: 5px;
    background: #fbfaff;
    color: var(--ink);
    white-space: nowrap;
  }
  .edit-input:focus { outline: none; box-shadow: 0 0 0 2px rgba(107,78,160,.15); }
  th {
    text-align: left;
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: #888;
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
  }
  .c-date  { width: 16%; }
  .c-room  { width: 12%; }
  .c-stat  { width: 20%; }
  .c-name  { width: 40%; }
  .c-pax   { width: 12%; text-align: right; padding-right: 8px; }
  th.c-pax { text-align: right; }

  .c-lead { white-space: nowrap; }
  .lead {
    display: flex;
    align-items: flex-end;
    width: 100%;
  }
  .lead > span { line-height: 1.4; }
  .lead-stat, .lead-name, .lead-pax { white-space: nowrap; }
  .lead-name { margin-left: 8px; }
  .lead-fill {
    flex: 1 1 auto;
    min-width: 12px;
    border-bottom: 1px dotted #cfcfcf;
    margin: 0 6px 4px;
  }
  .lead-pax { padding-right: 4px; }

  .b-date  { width: 22%; }
  .b-room  { width: 13%; }
  .b-name  { width: 38%; }
  .b-board { width: 15%; }
  .b-pax   { width: 12%; text-align: right; padding-right: 8px; }
  th.b-pax { text-align: right; }

  @media print {
    @page { size: A4 portrait; margin: 14mm 12mm; }
    body { background: #fff; }
    .controls { display: none; }
    .sheet {
      margin: 0;
      padding: 0;
      border: none;
      border-radius: 0;
      max-width: none;
    }
    table { font-size: 9.5px; }
    td, th { padding: 2.5px 4px; }
    thead { display: none; }
    .add-row-btn, .del-row-btn, .x-del-btn, .x-col, .edit-btn, .edit-col { display: none; }
  }
</style>
</head>
<body>

<div class="controls">
  <h1>Foglio camere</h1>
  <p>Incolla i dati grezzi (una riga per camera). Il formato viene riconosciuto in automatico. Note, messaggi e righe di totale vengono scartati.</p>
  <textarea id="input" spellcheck="false" placeholder="Incolla qui la lista..."></textarea>

  <div class="btnrow">
    <button onclick="window.print()">Stampa</button>
  </div>
  <p class="meta" id="meta"></p>
</div>

<div class="sheet">
  <table>
    <thead id="head"></thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<script>
  const BOARD     = /^(FB|HB|BB)$/i;
  const RANGEDATE = /^\d{1,2}\.\d{1,2}-\d{1,2}\.\d{1,2}$/;
  const SLASHDATE = /^\d{1,2}\/\d{1,2}\/\d{2,4}$/;
  // indicatore: M oppure un numero, eventualmente concatenati con "+"
  const INDICATOR = /^(M|\d+)(\+(M|\d+))*$/i;

  function esc(s) {
    return (s || '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  }

  // DD/MM/YY + DD/MM/YY -> DD.MM-DD.MM
  function fmtRange(a, b) {
    const f = s => { const p = s.split('/'); return p[0].padStart(2,'0') + '.' + p[1].padStart(2,'0'); };
    return f(a) + '-' + f(b);
  }

  function lineType(t) {
    if (!t[0]) return null;
    if (SLASHDATE.test(t[0]) && t[1] && SLASHDATE.test(t[1])) return 'B';
    const slash = t.filter(x => SLASHDATE.test(x));
    if (slash.length >= 2) return 'C';
    if (t.some(x => RANGEDATE.test(x))) return 'A';
    return null;
  }

  function detectType(lines) {
    const c = { A: 0, B: 0, C: 0 };
    for (const l of lines) {
      const ty = lineType(l.trim().split(/\s+/));
      if (ty) c[ty]++;
    }
    return c.A >= c.B && c.A >= c.C ? 'A' : (c.B >= c.C ? 'B' : 'C');
  }

  // ---- Tipo A: 106. x FB 14.06-22.06 NOME ... PAX P ----
  function parseA(line) {
    const t = line.trim().split(/\s+/);
    if (t.length < 4) return null;
    const boardIdx = t.findIndex(x => BOARD.test(x));
    if (boardIdx < 1) return null;

    const room   = t[0];
    const status = t.slice(1, boardIdx).join(' ');
    const dates  = (t[boardIdx + 1] && RANGEDATE.test(t[boardIdx + 1])) ? t[boardIdx + 1] : (t[boardIdx + 1] || '');

    let rest = t.slice(boardIdx + 2);
    if (rest.length && /^p$/i.test(rest[rest.length - 1])) rest = rest.slice(0, -1);
    let pax = '';
    if (rest.length && /^\d+$/.test(rest[rest.length - 1])) pax = rest.pop();
    const nameRaw = rest.join(' ');

    const tokens = nameRaw ? nameRaw.split(/\s+/) : [];
    const keep = tokens.length > 0 && INDICATOR.test(tokens[tokens.length - 1]);
    const name = keep ? nameRaw : '';

    return { dates, room, status, name, pax };
  }

  // ---- Tipo B: 15/06/26 19/06/26 126. NOME [IND] PAX FB P ----
  function parseB(line) {
    const t = line.trim().split(/\s+/);
    if (!SLASHDATE.test(t[0]) || !t[1] || !SLASHDATE.test(t[1])) return null;
    const period   = fmtRange(t[0], t[1]);
    const room     = t[2] || '';
    const boardIdx = t.findIndex(x => BOARD.test(x));
    const board    = boardIdx !== -1 ? t[boardIdx].toUpperCase() : '';
    let seg = t.slice(3, boardIdx !== -1 ? boardIdx : t.length);
    if (seg.length && /^p$/i.test(seg[seg.length - 1])) seg.pop();
    let pax = '';
    if (seg.length && /^\d+$/.test(seg[seg.length - 1])) pax = seg.pop(); // ultimo numero = persone
    const name = seg.join(' '); // eventuale indicatore resta nel nome
    return { period, room, name, board, pax };
  }

  // ---- Tipo C: 126. PAX NOME [IND] FB P 15/06/26 19/06/26 ----
  function parseC(line) {
    const t = line.trim().split(/\s+/);
    const slash = t.filter(x => SLASHDATE.test(x));
    if (slash.length < 2) return null;
    const period   = fmtRange(slash[0], slash[1]);
    const room     = t[0];
    const boardIdx = t.findIndex(x => BOARD.test(x));
    const board    = boardIdx !== -1 ? t[boardIdx].toUpperCase() : '';
    let seg = t.slice(1, boardIdx !== -1 ? boardIdx : t.length);
    let pax = '';
    if (seg.length && /^\d+$/.test(seg[0])) pax = seg.shift(); // primo numero = persone
    const name = seg.join(' '); // eventuale indicatore resta nel nome
    return { period, room, name, board, pax };
  }

  function makeAddBtn(insertAfterRow) {
    const btn = document.createElement('button');
    btn.className = 'add-row-btn';
    btn.title = 'Aggiungi riga vuota sotto';
    btn.textContent = '+';
    btn.addEventListener('click', function() {
      const emptyTr = document.createElement('tr');
      emptyTr.className = 'empty-row';
      const headCols = document.querySelectorAll('#head tr th').length;
      const cols = headCols || 7;
      for (let i = 0; i < cols; i++) {
        const td = document.createElement('td');
        if (i === cols - 3) {
          td.appendChild(makeAddBtn(emptyTr));
          td.appendChild(makeDelBtn(emptyTr));
        }
        emptyTr.appendChild(td);
      }
      insertAfterRow.insertAdjacentElement('afterend', emptyTr);
    });
    return btn;
  }

  function makeDelBtn(rowToRemove) {
    const btn = document.createElement('button');
    btn.className = 'del-row-btn';
    btn.title = 'Rimuovi riga';
    btn.textContent = '−';
    btn.addEventListener('click', function() {
      rowToRemove.remove();
    });
    return btn;
  }

  const PENCIL_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>';
  const CHECK_SVG  = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

  // Crea il pulsante matita che attiva la modalità edit per la riga "tr" (riga generata, line index "li")
  function makeEditBtn(tr, li) {
    const btn = document.createElement('button');
    btn.className = 'edit-btn edit-pencil';
    btn.title = 'Modifica riga';
    btn.innerHTML = PENCIL_SVG;
    btn.addEventListener('click', function() {
      entraInEdit(tr, li, btn);
    });
    return btn;
  }

  // Sostituisce il contenuto della riga con un singolo input che contiene il testo grezzo originale
  function entraInEdit(tr, li, pencilBtn) {
    const ta = document.getElementById('input');
    const lines = ta.value.split('\n');
    const original = lines[li] !== undefined ? lines[li] : '';

    tr.classList.add('editing-row');
    const colCount = tr.children.length;
    tr.innerHTML = '';

    const td = document.createElement('td');
    td.colSpan = colCount - 1; // tutta la riga tranne la colonna check/edit
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'edit-input';
    input.value = original;
    td.appendChild(input);
    tr.appendChild(td);

    const checkTd = document.createElement('td');
    const checkBtn = document.createElement('button');
    checkBtn.className = 'edit-btn edit-check';
    checkBtn.title = 'Confirma modifica';
    checkBtn.innerHTML = CHECK_SVG;
    checkBtn.addEventListener('click', function() {
      confermaEdit(li, input.value);
    });
    checkTd.appendChild(checkBtn);
    tr.appendChild(checkTd);

    input.addEventListener('keydown', function(ev) {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        confermaEdit(li, input.value);
      }
    });

    input.focus();
    input.setSelectionRange(input.value.length, input.value.length);
  }

  // Scrive il nuovo testo della riga "li" nel textarea grezzo e rigenera la tabella
  function confermaEdit(li, newValue) {
    const ta = document.getElementById('input');
    const lines = ta.value.split('\n');
    lines[li] = newValue;
    ta.value = lines.join('\n');
    genera();
  }

  function genera() {
    const lines = document.getElementById('input').value.split('\n');
    const head  = document.getElementById('head');
    const tbody = document.getElementById('rows');
    head.innerHTML = '';
    tbody.innerHTML = '';

    const type = detectType(lines);
    const parse = type === 'A' ? parseA : (type === 'B' ? parseB : parseC);

    head.innerHTML = type === 'A'
      ? '<tr><th class="c-date">Periodo</th><th class="c-room">Camera</th><th class="c-stat">Stato</th><th class="c-name">Nome</th><th class="c-pax">N.</th><th class="edit-col"></th><th class="x-col"></th></tr>'
      : '<tr><th class="b-date">Periodo</th><th class="b-room">Camera</th><th class="b-name">Nome</th><th class="b-board">Tratt.</th><th class="b-pax">N.</th><th class="edit-col"></th><th class="x-col"></th></tr>';

    let n = 0, withName = 0, scartate = 0;

    for (let li = 0; li < lines.length; li++) {
      const line = lines[li];
      if (!line.trim()) continue;
      const r = parse(line);
      if (!r) { scartate++; continue; }

      n++;
      const tr = document.createElement('tr');
      tr.dataset.lineIndex = li;
      if (type === 'A') {
        if (r.name) withName++;
        const lead =
          `<div class="lead">` +
            `<span class="lead-stat">${esc(r.status)}</span>` +
            (r.name ? `<span class="lead-name">${esc(r.name)}</span>` : '') +
            `<span class="lead-fill"></span>` +
            `<span class="lead-pax">${esc(r.pax)}</span>` +
          `</div>`;
        tr.innerHTML =
          `<td class="c-date">${esc(r.dates)}</td>` +
          `<td class="c-room">${esc(r.room)}</td>` +
          `<td class="c-lead" colspan="3">${lead}</td>`;
      } else {
        tr.innerHTML =
          `<td class="b-date">${esc(r.period)}</td>` +
          `<td class="b-room">${esc(r.room)}</td>` +
          `<td class="b-name">${esc(r.name)}</td>` +
          `<td class="b-board">${esc(r.board)}</td>` +
          `<td class="b-pax">${esc(r.pax)}</td>`;
      }

      // append the + button into the last cell
      const lastTd = tr.lastElementChild;
      lastTd.appendChild(makeAddBtn(tr));

      // Edit column: matita per modificare la riga grezza
      const editTd = document.createElement('td');
      editTd.className = 'edit-col';
      editTd.appendChild(makeEditBtn(tr, li));
      tr.appendChild(editTd);

      // X column: removes this row's source line from the textarea and regenerates
      const xTd = document.createElement('td');
      xTd.className = 'x-col';
      const xBtn = document.createElement('button');
      xBtn.className = 'x-del-btn';
      xBtn.title = 'Elimina riga';
      xBtn.textContent = '✕';
      xBtn.addEventListener('click', function() {
        eliminaRigaInput(li);
      });
      xTd.appendChild(xBtn);
      tr.appendChild(xTd);

      tbody.appendChild(tr);
    }

    const meta = document.getElementById('meta');
    const scrap = scartate ? ` · ${scartate} righe ignorate` : '';
    meta.textContent = type === 'A'
      ? `Tipo A · ${n} camere · ${withName} con indicatore${scrap}`
      : `Tipo ${type} · ${n} camere${scrap}`;
  }

  // Rimuove la riga "li" dal testo grezzo nel textarea e ricostruisce la tabella
  function eliminaRigaInput(li) {
    const ta = document.getElementById('input');
    const lines = ta.value.split('\n');
    lines.splice(li, 1);
    ta.value = lines.join('\n');
    genera();
  }

  document.getElementById('input').addEventListener('input', genera);
  genera();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        // controlla subito se c'è una versione più recente
        reg.update();
        // e ogni volta che l'app torna in primo piano
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') reg.update();
        });
      });
    });
  }
</script>
</body>
</html>
