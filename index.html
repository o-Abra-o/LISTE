<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json?v=2">
<link rel="icon" href="icon-512.png?v=2" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
<meta name="theme-color" content="#7ab87a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Foglio camere">
<title>Foglio camere</title>
<style>
  :root {
    --ink: #1a1a1a;
    --line: #d8d8d8;
    --bg: #f3f1ec;
    --panel: #ffffff;
    --accent: #6b4ea0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* ---- area controlli (non stampata) ---- */
  .controls {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 8px;
  }
  .controls h1 {
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 4px;
  }
  .controls p {
    margin: 0 0 14px;
    font-size: 13px;
    color: #555;
    line-height: 1.5;
  }
  textarea {
    width: 100%;
    min-height: 220px;
    padding: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    line-height: 1.5;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    resize: vertical;
  }
  .btnrow {
    display: flex;
    gap: 10px;
    margin: 12px 0 4px;
    flex-wrap: wrap;
  }
  button {
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 9px 18px;
    border: 1px solid var(--accent);
    border-radius: 8px;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
  }
  button.secondary {
    background: #fff;
    color: var(--accent);
  }
  button:active { transform: translateY(1px); }
  .toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #555;
    cursor: pointer;
    user-select: none;
  }
  .toggle input { position: absolute; opacity: 0; width: 0; height: 0; }
  .switch {
    width: 38px; height: 22px;
    border-radius: 11px;
    background: #ccc;
    position: relative;
    transition: background .15s;
    flex-shrink: 0;
  }
  .switch::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fff;
    transition: transform .15s;
    box-shadow: 0 1px 2px rgba(0,0,0,.3);
  }
  .toggle input:checked + .switch { background: var(--accent); }
  .toggle input:checked + .switch::after { transform: translateX(16px); }
  .meta {
    font-size: 12px;
    color: #666;
    margin: 8px 0 0;
  }

  /* ---- foglio (stampato) ---- */
  .sheet {
    background: var(--panel);
    max-width: 900px;
    margin: 18px auto 40px;
    padding: 28px 32px;
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  td, th {
    padding: 5px 4px;
    vertical-align: baseline;
    white-space: nowrap;
  }
  .add-row-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid #ccc;
    background: #fff;
    color: #aaa;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    margin-left: 6px;
    vertical-align: middle;
    transition: border-color .15s, color .15s;
    flex-shrink: 0;
  }
  .add-row-btn:hover { border-color: var(--accent); color: var(--accent); }
  .add-row-btn:active { transform: none; }
  .del-row-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid #ccc;
    background: #fff;
    color: #aaa;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    margin-left: 4px;
    vertical-align: middle;
    transition: border-color .15s, color .15s;
    flex-shrink: 0;
  }
  .del-row-btn:hover { border-color: #c0392b; color: #c0392b; }
  .del-row-btn:active { transform: none; }
  tr.empty-row td {
    border-bottom: 1px solid var(--line);
    padding: 0;
    height: 22px;
  }
  .x-col { width: 22px; }
  .x-del-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border: none;
    background: none;
    color: #d24b3f;
    font-size: 13px;
    font-weight: 700;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    opacity: .55;
    transition: opacity .15s, transform .1s;
  }
  .x-del-btn:hover { opacity: 1; }
  .x-del-btn:active { transform: scale(0.85); }

  /* ---- editing per singolo campo ---- */
  .edit-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    border: none;
    background: none;
    cursor: pointer;
    padding: 0;
    opacity: 0;
    transition: opacity .15s, transform .1s;
    vertical-align: middle;
    flex-shrink: 0;
  }
  .editable-cell:hover .edit-btn,
  .inline-editable:hover .edit-btn { opacity: .6; }
  .edit-btn:hover { opacity: 1 !important; }
  /* in edit mode il check resta visibile finche' non si conferma */
  .cell-editing .edit-check { opacity: 1 !important; }
  .edit-btn:active { transform: scale(0.85); }
  .edit-btn svg { width: 13px; height: 13px; display: block; }
  .edit-pencil svg { stroke: #3b6fd1; }
  .edit-check svg { stroke: #2e9e4f; }

  .editable-cell { position: relative; }
  .editable-cell .cell-text { margin-right: 4px; }
  .editable-cell.cell-editing { padding: 2px 4px; }

  .inline-editable {
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .inline-editable .cell-text { display: inline; }

  .edit-input {
    font: inherit;
    font-size: 11px;
    padding: 2px 5px;
    border: 1px solid var(--accent);
    border-radius: 5px;
    background: #fbfaff;
    color: var(--ink);
  }
  .edit-input:focus { outline: none; box-shadow: 0 0 0 2px rgba(107,78,160,.15); }
  .edit-input-inline {
    width: 90px;
  }
  th {
    text-align: left;
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: #888;
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
  }
  .c-date  { width: 16%; }
  .c-room  { width: 12%; }
  .c-stat  { width: 20%; }
  .c-name  { width: 40%; }
  .c-pax   { width: 12%; text-align: right; padding-right: 8px; }
  th.c-pax { text-align: right; }

  .c-lead { white-space: nowrap; }
  .lead {
    display: flex;
    align-items: flex-end;
    width: 100%;
  }
  .lead > span { line-height: 1.4; }
  .lead-stat, .lead-name, .lead-pax { white-space: nowrap; }
  .lead-name { margin-left: 8px; }
  .lead-fill {
    flex: 1 1 auto;
    min-width: 12px;
    border-bottom: 1px dotted #cfcfcf;
    margin: 0 6px 4px;
  }
  .lead-pax { padding-right: 4px; }

  .b-date  { width: 22%; }
  .b-room  { width: 13%; }
  .b-name  { width: 38%; }
  .b-board { width: 15%; }
  .b-pax   { width: 12%; text-align: right; padding-right: 8px; }
  th.b-pax { text-align: right; }

  tr.section-head td {
    text-align: center;
    font-weight: 700;
    font-size: 1.25em;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 14px 4px 6px;
    border-bottom: 1.5px solid var(--ink);
    color: var(--ink);
  }
  tr.section-head.first td { padding-top: 0; }

  @media print {
    @page { size: A4 portrait; margin: 14mm 12mm; }
    body { background: #fff; }
    .controls { display: none; }
    .sheet {
      margin: 0;
      padding: 0;
      border: none;
      border-radius: 0;
      max-width: none;
    }
    table { font-size: var(--print-font, 9.5px); }
    td, th { padding: 2.5px 4px; }
    thead { display: none; }
    .add-row-btn, .del-row-btn, .x-del-btn, .x-col, .edit-btn { display: none !important; }
  }
</style>
</head>
<body>

<div class="controls">
  <h1>Foglio camere</h1>
  <p>Incolla i dati grezzi (una riga per camera). Il formato viene riconosciuto in automatico. Note, messaggi e righe di totale vengono scartati.</p>
  <textarea id="input" spellcheck="false" placeholder="Incolla qui la lista..."></textarea>

  <div class="btnrow">
    <button onclick="stampa()">Stampa</button>
    <label class="toggle">
      <input type="checkbox" id="autoResize">
      <span class="switch"></span>
      Resize automatico
    </label>
  </div>
  <p class="meta" id="meta"></p>
</div>

<div class="sheet">
  <table>
    <thead id="head"></thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<script>
  const BOARD     = /^(FB|HB|BB)$/i;
  const RANGEDATE = /^\d{1,2}\.\d{1,2}-\d{1,2}\.\d{1,2}$/;
  const SLASHDATE = /^\d{1,2}\/\d{1,2}\/\d{2,4}$/;
  // indicatore: M oppure un numero, eventualmente concatenati con "+"
  const INDICATOR = /^(M|\d+)(\+(M|\d+))*$/i;

  function esc(s) {
    return (s || '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  }

  // DD/MM/YY + DD/MM/YY -> DD.MM-DD.MM
  function fmtRange(a, b) {
    const f = s => { const p = s.split('/'); return p[0].padStart(2,'0') + '.' + p[1].padStart(2,'0'); };
    return f(a) + '-' + f(b);
  }

  function lineType(t) {
    if (!t[0]) return null;
    if (SLASHDATE.test(t[0]) && t[1] && SLASHDATE.test(t[1])) return 'B';
    const slash = t.filter(x => SLASHDATE.test(x));
    if (slash.length >= 2) return 'C';
    if (t.some(x => RANGEDATE.test(x))) return 'A';
    return null;
  }

  function detectType(lines) {
    const c = { A: 0, B: 0, C: 0 };
    for (const l of lines) {
      const ty = lineType(l.trim().split(/\s+/));
      if (ty) c[ty]++;
    }
    return c.A >= c.B && c.A >= c.C ? 'A' : (c.B >= c.C ? 'B' : 'C');
  }

  // ---- Tipo A: 106. x FB 14.06-22.06 NOME ... PAX P ----
  function parseA(line) {
    const t = line.trim().split(/\s+/);
    if (t.length < 4) return null;
    const boardIdx = t.findIndex(x => BOARD.test(x));
    if (boardIdx < 1) return null;

    const room   = t[0];
    const status = t.slice(1, boardIdx).join(' ');
    const board  = t[boardIdx].toUpperCase();
    const dates  = (t[boardIdx + 1] && RANGEDATE.test(t[boardIdx + 1])) ? t[boardIdx + 1] : (t[boardIdx + 1] || '');

    let rest = t.slice(boardIdx + 2);
    if (rest.length && /^p$/i.test(rest[rest.length - 1])) rest = rest.slice(0, -1);
    let pax = '';
    if (rest.length && /^\d+$/.test(rest[rest.length - 1])) pax = rest.pop();
    const nameRaw = rest.join(' ');

    const tokens = nameRaw ? nameRaw.split(/\s+/) : [];
    const keep = tokens.length > 0 && INDICATOR.test(tokens[tokens.length - 1]);
    const name = keep ? nameRaw : '';

    return { dates, room, status, board, name, pax };
  }

  // ---- Tipo B: 15/06/26 19/06/26 126. NOME [IND] PAX FB P ----
  function parseB(line) {
    const t = line.trim().split(/\s+/);
    if (!SLASHDATE.test(t[0]) || !t[1] || !SLASHDATE.test(t[1])) return null;
    const period   = fmtRange(t[0], t[1]);
    const room     = t[2] || '';
    const boardIdx = t.findIndex(x => BOARD.test(x));
    const board    = boardIdx !== -1 ? t[boardIdx].toUpperCase() : '';
    let seg = t.slice(3, boardIdx !== -1 ? boardIdx : t.length);
    if (seg.length && /^p$/i.test(seg[seg.length - 1])) seg.pop();
    let pax = '';
    if (seg.length && /^\d+$/.test(seg[seg.length - 1])) pax = seg.pop(); // ultimo numero = persone
    const name = seg.join(' '); // eventuale indicatore resta nel nome
    return { period, room, name, board, pax };
  }

  // ---- Tipo C: 126. PAX NOME [IND] FB P 15/06/26 19/06/26 ----
  function parseC(line) {
    const t = line.trim().split(/\s+/);
    const slash = t.filter(x => SLASHDATE.test(x));
    if (slash.length < 2) return null;
    const period   = fmtRange(slash[0], slash[1]);
    const room     = t[0];
    const boardIdx = t.findIndex(x => BOARD.test(x));
    const board    = boardIdx !== -1 ? t[boardIdx].toUpperCase() : '';
    let seg = t.slice(1, boardIdx !== -1 ? boardIdx : t.length);
    let pax = '';
    if (seg.length && /^\d+$/.test(seg[0])) pax = seg.shift(); // primo numero = persone
    const name = seg.join(' '); // eventuale indicatore resta nel nome
    return { period, room, name, board, pax };
  }

  // ---- Tipo D: lista con sezioni "Arrivi del giorno" / "Presenti del giorno",
  //      righe in formato C, totali e note scartati ----
  const SEC_ARRIVI   = /arrivi del giorno/i;
  const SEC_PRESENTI = /presenti del giorno/i;

  function hasSections(lines) {
    return lines.some(l => SEC_ARRIVI.test(l) || SEC_PRESENTI.test(l));
  }

  function parseSectioned(lines) {
    const out = [];
    let sec = 'arrivi';
    for (const line of lines) {
      const l = line.trim();
      if (!l) continue;
      if (SEC_ARRIVI.test(l))   { sec = 'arrivi';   continue; }
      if (SEC_PRESENTI.test(l)) { sec = 'presenti'; continue; }
      const r = parseC(l);
      if (!r) continue;          // intestazioni colonne, totali, note: ignorati
      r.section = sec;
      out.push(r);
    }
    return out;
  }

  // Stato strutturato: un array di oggetti riga, ciascuno con i campi del tipo rilevato.
  let rowsState = [];
  let currentType = 'A';

  function makeAddBtn(insertAfterRow) {
    const btn = document.createElement('button');
    btn.className = 'add-row-btn';
    btn.title = 'Aggiungi riga vuota sotto';
    btn.textContent = '+';
    btn.addEventListener('click', function() {
      const emptyTr = document.createElement('tr');
      emptyTr.className = 'empty-row';
      const headCols = document.querySelectorAll('#head tr th').length;
      const cols = headCols || 6;
      for (let i = 0; i < cols; i++) {
        const td = document.createElement('td');
        if (i === cols - 2) {
          td.appendChild(makeAddBtn(emptyTr));
          td.appendChild(makeDelBtn(emptyTr));
        }
        emptyTr.appendChild(td);
      }
      insertAfterRow.insertAdjacentElement('afterend', emptyTr);
    });
    return btn;
  }

  function makeDelBtn(rowToRemove) {
    const btn = document.createElement('button');
    btn.className = 'del-row-btn';
    btn.title = 'Rimuovi riga';
    btn.textContent = '−';
    btn.addEventListener('click', function() {
      rowToRemove.remove();
    });
    return btn;
  }

  const PENCIL_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>';
  const CHECK_SVG  = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

  // Estrae il numero iniziale da una stringa camera (es. "106." -> 106, "12A" -> 12)
  function roomNumber(room) {
    const m = String(room || '').match(/\d+/);
    return m ? parseInt(m[0], 10) : Infinity;
  }

  // Ricostruisce la riga grezza testuale a partire dai campi strutturati,
  // nel formato del tipo corrente, cosi' il textarea resta sempre sincronizzato.
  function serializeRow(r, type) {
    if (type === 'A') {
      // formato: room status board dates [name] [pax P]
      const parts = [r.room, r.status, r.board || 'FB', r.dates];
      if (r.name) parts.push(r.name);
      if (r.pax) parts.push(r.pax, 'P');
      return parts.filter(x => x !== undefined && x !== '').join(' ');
    } else if (type === 'C') {
      // formato C: room pax name board P dd/mm/yy dd/mm/yy
      const [d1, d2] = expandPeriod(r.period);
      const parts = [r.room];
      if (r.pax) parts.push(r.pax);
      if (r.name) parts.push(r.name);
      parts.push(r.board || 'FB', 'P', d1, d2);
      return parts.join(' ');
    } else {
      // tipo B: dd/mm/yy dd/mm/yy room [name] [pax] board P
      const [d1, d2] = expandPeriod(r.period);
      const parts = [d1, d2, r.room];
      if (r.name) parts.push(r.name);
      if (r.pax) parts.push(r.pax);
      if (r.board) parts.push(r.board);
      parts.push('P');
      return parts.join(' ');
    }
  }

  // DD.MM-DD.MM -> [DD/MM/YY, DD/MM/YY] usando l'anno corrente come fallback
  function expandPeriod(period) {
    const m = String(period || '').match(/^(\d{1,2})\.(\d{1,2})-(\d{1,2})\.(\d{1,2})$/);
    if (!m) return ['', ''];
    const yy = new Date().getFullYear().toString().slice(-2);
    const f = (d, mo) => `${d.padStart(2,'0')}/${mo.padStart(2,'0')}/${yy}`;
    return [f(m[1], m[2]), f(m[3], m[4])];
  }

  // Riscrive il textarea sulla base dello stato strutturato corrente (ordine = ordine visuale)
  function syncTextarea() {
    const ta = document.getElementById('input');
    if (currentType === 'D') {
      const lines = [];
      [['arrivi', 'Arrivi del giorno'], ['presenti', 'Presenti del giorno']].forEach(([sec, label]) => {
        const rows = rowsState.filter(r => (r.section || 'presenti') === sec);
        if (!rows.length) return;
        lines.push(label);
        rows.forEach(r => lines.push(serializeRow(r, 'C')));
      });
      ta.value = lines.join('\n');
      return;
    }
    ta.value = rowsState.map(r => serializeRow(r, currentType)).join('\n');
  }

  // Ordina rowsState per numero di camera crescente e ridisegna
  function sortByRoomAndRender() {
    rowsState.sort((a, b) => roomNumber(a.room) - roomNumber(b.room));
    syncTextarea();
    render();
  }

  // Aggiorna un campo di una riga nello stato; se il campo e' "room" riordina tutto
  function updateField(idx, field, value) {
    rowsState[idx][field] = value;
    if (field === 'room') {
      sortByRoomAndRender();
    } else {
      syncTextarea();
      render();
    }
  }

  function eliminaRiga(idx) {
    rowsState.splice(idx, 1);
    syncTextarea();
    render();
  }

  // Crea una cella editabile: mostra il testo con una matita; al click la matita
  // diventa un campo input con un check verde; Invio o click sul check confermano.
  function editableCell(value, idx, field, extraClass) {
    const td = document.createElement('td');
    if (extraClass) td.className = extraClass;
    td.classList.add('editable-cell');

    const span = document.createElement('span');
    span.className = 'cell-text';
    span.textContent = value || '';

    const pencil = document.createElement('button');
    pencil.className = 'edit-btn edit-pencil';
    pencil.title = 'Modifica';
    pencil.innerHTML = PENCIL_SVG;

    td.appendChild(span);
    td.appendChild(pencil);

    pencil.addEventListener('click', function() {
      startCellEdit(td, value, idx, field);
    });

    return td;
  }

  function startCellEdit(td, value, idx, field) {
    td.innerHTML = '';
    td.classList.add('cell-editing');

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'edit-input';
    input.value = value || '';

    const check = document.createElement('button');
    check.className = 'edit-btn edit-check';
    check.title = 'Confirma';
    check.innerHTML = CHECK_SVG;

    function confirmEdit() {
      updateField(idx, field, input.value.trim());
    }

    check.addEventListener('click', confirmEdit);
    input.addEventListener('keydown', function(ev) {
      if (ev.key === 'Enter') { ev.preventDefault(); confirmEdit(); }
    });

    td.appendChild(input);
    td.appendChild(check);
    input.focus();
    input.setSelectionRange(input.value.length, input.value.length);
  }

  function render() {
    const head  = document.getElementById('head');
    const tbody = document.getElementById('rows');
    head.innerHTML = '';
    tbody.innerHTML = '';

    head.innerHTML = currentType === 'A'
      ? '<tr><th class="c-date">Periodo</th><th class="c-room">Camera</th><th class="c-stat">Stato</th><th class="c-name">Nome</th><th class="c-pax">N.</th><th class="x-col"></th></tr>'
      : '<tr><th class="b-date">Periodo</th><th class="b-room">Camera</th><th class="b-name">Nome</th><th class="b-board">Tratt.</th><th class="b-pax">N.</th><th class="x-col"></th></tr>';

    const ncols = document.querySelectorAll('#head tr th').length || 6;

    function sectionHeading(label, first) {
      const tr = document.createElement('tr');
      tr.className = 'section-head' + (first ? ' first' : '');
      const td = document.createElement('td');
      td.colSpan = ncols;
      td.textContent = label;
      tr.appendChild(td);
      return tr;
    }

    if (currentType === 'D') {
      const groups = [['arrivi', 'Arrivi di oggi'], ['presenti', "Gia' presenti"]];
      let firstSection = true;
      groups.forEach(([sec, label]) => {
        const indices = [];
        rowsState.forEach((r, idx) => { if ((r.section || 'presenti') === sec) indices.push(idx); });
        if (!indices.length) return;
        tbody.appendChild(sectionHeading(label, firstSection));
        firstSection = false;
        indices.forEach(idx => tbody.appendChild(buildRow(rowsState[idx], idx)));
      });
    } else {
      rowsState.forEach((r, idx) => tbody.appendChild(buildRow(r, idx)));
    }

    const withName = currentType === 'A' ? rowsState.filter(r => r.name).length : 0;
    const meta = document.getElementById('meta');
    if (currentType === 'D') {
      const a = rowsState.filter(r => (r.section || 'presenti') === 'arrivi').length;
      const p = rowsState.length - a;
      meta.textContent = `Arrivi ${a} · Gia' presenti ${p}`;
    } else {
      meta.textContent = currentType === 'A'
        ? `Tipo A · ${rowsState.length} camere · ${withName} con indicatore`
        : `Tipo ${currentType} · ${rowsState.length} camere`;
    }
  }

  // Costruisce la <tr> editabile di una singola riga (tipo A oppure B/C/D)
  function buildRow(r, idx) {
    const tr = document.createElement('tr');

    if (currentType === 'A') {
      tr.appendChild(editableCell(r.dates, idx, 'dates', 'c-date'));
      tr.appendChild(editableCell(r.room, idx, 'room', 'c-room'));

      const leadTd = document.createElement('td');
      leadTd.className = 'c-lead';
      leadTd.colSpan = 3;
      const lead = document.createElement('div');
      lead.className = 'lead';

      lead.appendChild(editableInlineSpan(r.status, idx, 'status', 'lead-stat'));
      lead.appendChild(editableInlineSpan(r.name, idx, 'name', 'lead-name'));

      const fill = document.createElement('span');
      fill.className = 'lead-fill';
      lead.appendChild(fill);

      lead.appendChild(editableInlineSpan(r.pax, idx, 'pax', 'lead-pax'));

      leadTd.appendChild(lead);
      tr.appendChild(leadTd);
    } else {
      tr.appendChild(editableCell(r.period, idx, 'period', 'b-date'));
      tr.appendChild(editableCell(r.room, idx, 'room', 'b-room'));
      tr.appendChild(editableCell(r.name, idx, 'name', 'b-name'));
      tr.appendChild(editableCell(r.board, idx, 'board', 'b-board'));
      tr.appendChild(editableCell(r.pax, idx, 'pax', 'b-pax'));
    }

    // pulsante +
    tr.lastElementChild.appendChild(makeAddBtn(tr));

    // colonna X
    const xTd = document.createElement('td');
    xTd.className = 'x-col';
    const xBtn = document.createElement('button');
    xBtn.className = 'x-del-btn';
    xBtn.title = 'Elimina riga';
    xBtn.textContent = '✕';
    xBtn.addEventListener('click', function() { eliminaRiga(idx); });
    xTd.appendChild(xBtn);
    tr.appendChild(xTd);

    return tr;
  }

  // Variante inline (span) della cella editabile per i sotto-campi della riga tipo A
  function editableInlineSpan(value, idx, field, extraClass) {
    const wrap = document.createElement('span');
    wrap.className = 'inline-editable ' + (extraClass || '');

    const text = document.createElement('span');
    text.className = 'cell-text';
    text.textContent = value || '';

    const pencil = document.createElement('button');
    pencil.className = 'edit-btn edit-pencil';
    pencil.title = 'Modifica';
    pencil.innerHTML = PENCIL_SVG;

    wrap.appendChild(text);
    wrap.appendChild(pencil);

    pencil.addEventListener('click', function() {
      startInlineEdit(wrap, value, idx, field);
    });

    return wrap;
  }

  function startInlineEdit(wrap, value, idx, field) {
    wrap.innerHTML = '';
    wrap.classList.add('cell-editing');

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'edit-input edit-input-inline';
    input.value = value || '';

    const check = document.createElement('button');
    check.className = 'edit-btn edit-check';
    check.title = 'Confirma';
    check.innerHTML = CHECK_SVG;

    function confirmEdit() {
      updateField(idx, field, input.value.trim());
    }

    check.addEventListener('click', confirmEdit);
    input.addEventListener('keydown', function(ev) {
      if (ev.key === 'Enter') { ev.preventDefault(); confirmEdit(); }
    });

    wrap.appendChild(input);
    wrap.appendChild(check);
    input.focus();
    input.setSelectionRange(input.value.length, input.value.length);
  }

  // Costruisce lo stato strutturato a partire dal testo grezzo (usato solo quando
  // il textarea viene modificato manualmente dall'utente)
  function rebuildStateFromTextarea() {
    const lines = document.getElementById('input').value.split('\n');
    if (hasSections(lines)) {
      currentType = 'D';
      rowsState = parseSectioned(lines);
      render();
      return;
    }
    currentType = detectType(lines);
    const parse = currentType === 'A' ? parseA : (currentType === 'B' ? parseB : parseC);
    const newState = [];
    for (const line of lines) {
      if (!line.trim()) continue;
      const r = parse(line);
      if (!r) continue;
      newState.push(r);
    }
    rowsState = newState;
    render();
  }

  // ---- Resize automatico per la stampa ----
  // Sceglie il font piu' grande (entro limiti leggibili) che fa stare il foglio
  // nel minor numero di pagine A4 possibile (1, poi 2).
  const MM = 96 / 25.4;                 // px per mm a 96 dpi
  const PRINT_W = 186 * MM;             // larghezza utile A4 (210 - margini 12+12)
  const PAGE_H  = 269 * MM * 0.97;      // altezza utile A4 (297 - margini 14+14), con margine di sicurezza
  const F_MIN = 8, F_MAX = 15;          // limiti di leggibilita' (px)
  let autoResize = false;

  const measureCss = document.createElement('style');
  measureCss.textContent =
    '#print-measure{position:absolute;left:-99999px;top:0;max-width:none;margin:0;padding:0;border:none;background:#fff;}' +
    '#print-measure table{font-size:var(--measure-font);width:100%;border-collapse:collapse;}' +
    '#print-measure td,#print-measure th{padding:2.5px 4px;}' +
    '#print-measure thead{display:none;}' +
    '#print-measure .add-row-btn,#print-measure .del-row-btn,#print-measure .x-del-btn,#print-measure .x-col,#print-measure .edit-btn{display:none;}' +
    '#print-measure .section-head td{font-size:1.25em;}';
  document.head.appendChild(measureCss);

  function measureHeight(F) {
    const sheet = document.querySelector('.sheet');
    const clone = sheet.cloneNode(true);
    clone.id = 'print-measure';
    clone.style.width = PRINT_W + 'px';
    clone.style.setProperty('--measure-font', F + 'px');
    document.body.appendChild(clone);
    const h = clone.getBoundingClientRect().height;
    clone.remove();
    return h;
  }

  // Font piu' grande in [F_MIN, F_MAX] la cui altezza sta entro budget; null se nemmeno F_MIN ci sta
  function largestFit(budget) {
    if (measureHeight(F_MIN) > budget) return null;
    if (measureHeight(F_MAX) <= budget) return F_MAX;
    let lo = F_MIN, hi = F_MAX;
    for (let i = 0; i < 14; i++) {
      const mid = (lo + hi) / 2;
      if (measureHeight(mid) <= budget) lo = mid; else hi = mid;
    }
    return lo;
  }

  function computeAutoFont() {
    let F = largestFit(PAGE_H);          // prova 1 pagina
    if (F == null) F = largestFit(2 * PAGE_H); // poi 2 pagine
    if (F == null) F = F_MIN;            // troppo lungo: font minimo leggibile
    return Math.round(F * 10) / 10;
  }

  function applyAutoResize() {
    if (autoResize) {
      document.documentElement.style.setProperty('--print-font', computeAutoFont() + 'px');
    } else {
      document.documentElement.style.removeProperty('--print-font');
    }
  }

  function stampa() { applyAutoResize(); window.print(); }
  window.addEventListener('beforeprint', applyAutoResize);

  (function initToggle() {
    const cb = document.getElementById('autoResize');
    try { autoResize = localStorage.getItem('autoResize') === '1'; } catch (e) {}
    cb.checked = autoResize;
    cb.addEventListener('change', function() {
      autoResize = cb.checked;
      try { localStorage.setItem('autoResize', autoResize ? '1' : '0'); } catch (e) {}
    });
  })();

  document.getElementById('input').addEventListener('input', rebuildStateFromTextarea);
  rebuildStateFromTextarea();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        // controlla subito se c'è una versione più recente
        reg.update();
        // e ogni volta che l'app torna in primo piano
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') reg.update();
        });
      });
    });
  }
</script>
</body>
